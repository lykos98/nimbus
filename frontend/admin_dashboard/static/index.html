<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <i data-lucide="cloud-rain"></i>
                <h1>Nimbus</h1>
                <p>Admin Dashboard</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i data-lucide="log-in"></i>
                    Sign In
                </button>
                <div id="login-message" class="message message-error"></div>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-page" class="dashboard hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="cloud-rain"></i>
                <span>Nimbus</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="stations">
                    <i data-lucide="radio"></i>
                    <span>Stations</span>
                </button>
                <button class="nav-item" data-view="messages">
                    <i data-lucide="message-circle"></i>
                    <span>Messages</span>
                </button>
                <button class="nav-item" data-view="users" id="nav-users">
                    <i data-lucide="users"></i>
                    <span>Users</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="user-details">
                        <span id="current-username">User</span>
                        <span id="current-user-role">User</span>
                    </div>
                </div>
                <button id="logout-button" class="btn btn-ghost">
                    <i data-lucide="log-out"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard View -->
            <section id="view-dashboard" class="view active">
                <header class="view-header">
                    <div class="header-title">
                        <i data-lucide="layout-dashboard"></i>
                        <h1>Activity Feed</h1>
                    </div>
                    <button id="refresh-dashboard" class="btn btn-secondary">
                        <i data-lucide="refresh-cw"></i>
                        Refresh
                    </button>
                </header>
                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Type</label>
                        <select id="filter-type-dashboard" class="filter-select">
                            <option value="all">All Types</option>
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="filter-unhealthy-dashboard" checked>
                            <span>Show Unhealthy Stations</span>
                        </label>
                    </div>
                </div>
                <div id="dashboard-feed" class="feed-container">
                    <div class="loading">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>

            <!-- Stations View -->
            <section id="view-stations" class="view">
                <header class="view-header">
                    <div class="header-title">
                        <i data-lucide="radio"></i>
                        <h1>My Stations</h1>
                    </div>
                </header>
                <div id="stations-grid" class="stations-grid">
                    <div class="loading">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>

            <!-- Station Detail View -->
            <section id="view-station-detail" class="view">
                <header class="view-header">
                    <button id="back-to-stations" class="btn btn-ghost">
                        <i data-lucide="arrow-left"></i>
                        Back
                    </button>
                    <div class="header-title">
                        <i data-lucide="radio"></i>
                        <h1 id="station-detail-name">Station</h1>
                    </div>
                    <span id="station-detail-status" class="status-badge status-healthy">
                        <i data-lucide="check-circle"></i>
                        Healthy
                    </span>
                </header>
                <div class="station-detail-info">
                    <p id="station-detail-lastseen">Last seen: -</p>
                    <div class="station-detail-form">
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label>Description</label>
                                <input type="text" id="station-detail-description" placeholder="Station description">
                            </div>
                            <div class="form-group">
                                <label>Public</label>
                                <label class="toggle">
                                    <input type="checkbox" id="station-detail-public">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <button id="save-station-detail" class="btn btn-primary">
                                <i data-lucide="save"></i>
                                Save
                            </button>
                        </div>
                    </div>
                </div>
                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Show</label>
                        <select id="filter-messages-limit" class="filter-select">
                            <option value="10">Last 10</option>
                            <option value="25">Last 25</option>
                            <option value="50">Last 50</option>
                            <option value="100">Last 100</option>
                        </select>
                    </div>
                </div>
                <div id="station-messages" class="messages-list">
                    <div class="loading">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>

            <!-- Messages View -->
            <section id="view-messages" class="view">
                <header class="view-header">
                    <div class="header-title">
                        <i data-lucide="message-circle"></i>
                        <h1>All Messages</h1>
                    </div>
                    <button id="refresh-messages" class="btn btn-secondary">
                        <i data-lucide="refresh-cw"></i>
                        Refresh
                    </button>
                </header>
                <div class="filters-bar">
                    <div class="filter-group">
                        <label>Station</label>
                        <select id="filter-station-messages" class="filter-select">
                            <option value="all">All Stations</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Type</label>
                        <select id="filter-type-messages" class="filter-select">
                            <option value="all">All Types</option>
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="filter-unhealthy-messages">
                            <span>Unhealthy Only</span>
                        </label>
                    </div>
                </div>
                <div id="all-messages" class="messages-list">
                    <div class="loading">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>

            <!-- Users View (Admin Only) -->
            <section id="view-users" class="view">
                <header class="view-header">
                    <div class="header-title">
                        <i data-lucide="users"></i>
                        <h1>User Management</h1>
                    </div>
                    <button id="add-user-btn" class="btn btn-primary">
                        <i data-lucide="user-plus"></i>
                        Add User
                    </button>
                </header>
                <div id="users-list" class="users-list">
                    <div class="loading">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>Loading...</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add User Modal -->
    <div id="modal-add-user" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New User</h2>
                <button class="btn btn-ghost modal-close">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="add-user-form" class="modal-body">
                <div class="form-group">
                    <label for="new-username">Username</label>
                    <input type="text" id="new-username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="new-password">Password</label>
                    <input type="password" id="new-password" required placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="new-is-admin">
                        <span>Admin User</span>
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost modal-close">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Station Modal -->
    <div id="modal-add-station" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Station</h2>
                <button class="btn btn-ghost modal-close">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="add-station-form" class="modal-body">
                <div class="form-group">
                    <label for="new-station-id">Station ID</label>
                    <input type="text" id="new-station-id" required placeholder="e.g., station-001">
                </div>
                <div class="form-group">
                    <label for="station-user-id">Assign to User ID</label>
                    <input type="number" id="station-user-id" required placeholder="User ID">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost modal-close">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Station</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
